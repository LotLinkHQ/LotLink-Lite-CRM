# Render Blueprint - https://render.com/docs/blueprint-spec

services:
  - type: web
    name: rv-sales-crm-api
    env: node
    buildCommand: npm install
    startCommand: npx tsx server/index.production.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false

databases:
  - name: rv-sales-crm-db
    plan: free
    databaseName: rv_crm
    user: rv_crm_user
